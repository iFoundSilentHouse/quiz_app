services:
  postgres:
    image: postgres:16-alpine
    container_name: ${PROJECT_NAME}-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - monorepo-network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d ${POSTGRES_DB} -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../../
      target: api
    container_name: ${PROJECT_NAME}-api
    environment:
      # Пробрасываем переменные для TypeORM
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
      PORT: ${PORT}
      NODE_ENV: production
      FRONTEND_URL: ${FRONTEND_URL}
      # Ссылка на сам api (на момент первого деплоя ради корректных ссылок на картинки в сервисе загрузок картинок)
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    ports:
      - "${PORT}:${PORT}"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
    - ../../uploads:/app/uploads
    networks:
      - monorepo-network
    restart: always

  web:
    build:
      context: ../../
      target: web
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    container_name: ${PROJECT_NAME}-web
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      PORT: 3010
    ports:
      - "3010:3010"
    depends_on:
      - api
    networks:
      - monorepo-network
    restart: always

networks:
  monorepo-network:
    driver: bridge

volumes:
  postgres_data: